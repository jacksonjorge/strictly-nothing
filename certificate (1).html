<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Certificate of Nothing</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='5' y='5' width='90' height='90' fill='none' stroke='black' stroke-width='6'/></svg>"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white: #ffffff;
      --black: #0a0a0a;
      --grey: #e8e8e8;
      --mid: #999;
    }

    html, body {
      background: var(--white);
      color: var(--black);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
    }

    ::selection { background: var(--black); color: var(--white); }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2rem 3rem;
      border-bottom: 1px solid var(--grey);
    }

    .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem;
      letter-spacing: -0.02em;
      text-decoration: none;
      color: var(--black);
    }

    .back-link {
      font-size: 0.75rem;
      color: var(--mid);
      text-decoration: none;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .back-link:hover { color: var(--black); }

    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 6rem 2rem;
      text-align: center;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2.5rem;
      letter-spacing: -0.02em;
      margin-bottom: 1.2rem;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.1s;
    }

    .msg {
      font-size: 0.8rem;
      color: var(--mid);
      line-height: 1.8;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.3s;
    }

    .redownload {
      display: inline-block;
      margin-top: 2.5rem;
      font-size: 0.7rem;
      color: var(--mid);
      text-decoration: underline;
      cursor: pointer;
      letter-spacing: 0.05em;
      background: none;
      border: none;
      font-family: 'DM Mono', monospace;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.5s;
    }

    .redownload:hover { color: var(--black); }

    .note {
      margin-top: 3rem;
      font-size: 0.65rem;
      color: #ccc;
      line-height: 1.8;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.7s;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      nav { padding: 1.5rem; }
      .container { padding: 4rem 1.5rem; }
      h1 { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="logo" href="/">strictly-nothing</a>
    <a class="back-link" href="/">← Back to shop</a>
  </nav>

  <div class="container">
    <h1>Your Nothing Awaits</h1>
    <p class="msg" id="msg">Preparing your certificate...</p>
    <button class="redownload" id="redownloadBtn" style="display:none;" onclick="generateCertificate()">download again</button>
    <p class="note">This certificate is worth exactly nothing.<br>Void where prohibited. Which is nowhere, because it's nothing.</p>
  </div>

  <script>
    function generateCertificate() {
      const name = localStorage.getItem('certName') || 'Nobody';

      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: 'landscape', unit: 'in', format: 'letter' });
      const w = 11;
      const h = 8.5;

      const black = [10, 10, 10];
      const grey = [153, 153, 153];
      const lightGrey = [232, 232, 232];
      const faintGrey = [204, 204, 204];

      doc.setDrawColor(...lightGrey);
      doc.setLineWidth(0.02);
      doc.rect(0.6, 0.6, w - 1.2, h - 1.2);

      doc.setLineWidth(0.005);
      doc.rect(0.8, 0.8, w - 1.6, h - 1.6);

      doc.setFont('courier', 'normal');
      doc.setFontSize(7);
      doc.setTextColor(...grey);
      doc.text('STRICTLY-NOTHING.COM  —  EST. 2026', w / 2, 1.3, { align: 'center' });

      doc.setFont('times', 'normal');
      doc.setFontSize(42);
      doc.setTextColor(...black);
      doc.text('Certificate of Nothing', w / 2, 2.2, { align: 'center' });

      doc.setDrawColor(...lightGrey);
      doc.setLineWidth(0.005);
      doc.line(w / 2 - 1.5, 2.4, w / 2 + 1.5, 2.4);

      doc.setFont('courier', 'normal');
      doc.setFontSize(9);
      doc.setTextColor(...grey);
      doc.text('This document hereby certifies that', w / 2, 2.9, { align: 'center' });

      doc.setFont('times', 'italic');
      doc.setFontSize(30);
      doc.setTextColor(...black);
      doc.text(name, w / 2, 3.55, { align: 'center' });

      const nameWidth = doc.getTextWidth(name);
      const ulW = Math.max(nameWidth + 0.4, 3);
      doc.setDrawColor(...lightGrey);
      doc.setLineWidth(0.005);
      doc.line(w / 2 - ulW / 2, 3.65, w / 2 + ulW / 2, 3.65);

      doc.setFont('courier', 'normal');
      doc.setFontSize(9);
      doc.setTextColor(...grey);

      const bodyLines = [
        'is the proud owner of absolutely, unequivocally, and strictly nothing.',
        '',
        'No goods were exchanged. No services were rendered. No value was transferred.',
        'This certificate serves as official documentation of the above nothingness.'
      ];

      let bodyY = 4.05;
      bodyLines.forEach(line => {
        doc.text(line, w / 2, bodyY, { align: 'center' });
        bodyY += 0.2;
      });

      const sealX = w / 2;
      const sealY = 5.7;
      doc.setDrawColor(...lightGrey);
      doc.setLineWidth(0.01);
      doc.circle(sealX, sealY, 0.45);
      doc.circle(sealX, sealY, 0.38);

      doc.setFont('courier', 'normal');
      doc.setFontSize(5.5);
      doc.setTextColor(...grey);
      doc.text('CERTIFIED', sealX, sealY - 0.07, { align: 'center' });
      doc.text('NOTHING', sealX, sealY + 0.05, { align: 'center' });
      doc.text('2026', sealX, sealY + 0.17, { align: 'center' });

      const sigY = 6.6;
      const sigW = 2;
      const leftX = w / 2 - 2.5;
      const rightX = w / 2 + 2.5;

      doc.setDrawColor(...lightGrey);
      doc.setLineWidth(0.005);
      doc.line(leftX - sigW / 2, sigY, leftX + sigW / 2, sigY);
      doc.line(rightX - sigW / 2, sigY, rightX + sigW / 2, sigY);

      doc.setFont('courier', 'normal');
      doc.setFontSize(6.5);
      doc.setTextColor(...grey);
      doc.text('CHIEF NOTHING OFFICER', leftX, sigY + 0.2, { align: 'center' });
      doc.text('DIRECTOR OF EMPTINESS', rightX, sigY + 0.2, { align: 'center' });

      doc.setFontSize(6);
      doc.setTextColor(...faintGrey);
      const serial = 'SN-' + String(Math.floor(Math.random() * 999999)).padStart(6, '0');
      doc.text(serial + '  ·  VOID WHERE PROHIBITED  ·  STRICTLY-NOTHING.COM', w / 2, 7.6, { align: 'center' });

      doc.save('Certificate_of_Nothing_' + name.replace(/\s+/g, '_') + '.pdf');

      const msg = document.getElementById('msg');
      if (name === 'Nobody') {
        msg.innerHTML = 'Your Certificate of Nothing has been downloaded.<br>Nobody is now the proud owner of absolutely nothing. As it should be.';
      } else {
        msg.innerHTML = 'Your Certificate of Nothing has been downloaded.<br>You are now the proud owner of absolutely nothing. Congratulations.';
      }
      document.getElementById('redownloadBtn').style.display = 'inline-block';
    }

    // Check for valid Stripe session ID
    const urlParams = new URLSearchParams(window.location.search);
    const sessionId = urlParams.get('session_id');

    if (sessionId && sessionId.startsWith('cs_')) {
      // Valid purchase — auto-download
      setTimeout(() => {
        generateCertificate();
      }, 800);
    } else {
      // No valid session — block access
      document.getElementById('msg').innerHTML = 'No valid purchase found.<br>Please buy a Certificate of Nothing from <a href="/" style="color:#0a0a0a;">strictly-nothing.com</a> first.';
    }
  </script>

</body>
</html>
